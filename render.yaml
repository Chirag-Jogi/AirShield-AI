services:
  - type: web
    name: airshield-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.bot.bot
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: AQICN_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: WEBHOOK_URL
        sync: false  # Format: https://your-app.onrender.com/webhook
      - key: PYTHON_VERSION
        value: 3.11.0
