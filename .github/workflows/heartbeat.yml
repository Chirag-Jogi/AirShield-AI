name: AirShield Heartbeat
# Keeps the Render service awake by pinging it every 14 min.
# Render Free Tier sleeps after 15 minutes of inactivity.

on:
  schedule:
    - cron: '*/10 * * * *'  # Pulse every 10 minutes (to try and beat the 15-min sleep)
  workflow_dispatch:        

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: 💓 Reach Out Heartbeat (Dual-Pulse)
        run: |
          # Pulse 1
          curl -I ${{ secrets.RENDER_URL }}
          echo "Pulse 1 sent. Waiting 5 minutes to bridge the gap..."
          sleep 300
          # Pulse 2
          curl -I ${{ secrets.RENDER_URL }}
          echo "Pulse 2 sent. Heartbeat complete. 🛡️"
